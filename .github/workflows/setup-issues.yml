name: Setup assignment issues

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: setup-issues-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ensure-assignment-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Crear issues faltantes de la actividad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import json
          import os
          import textwrap
          import urllib.error
          import urllib.parse
          import urllib.request

          REPO = os.environ["GITHUB_REPOSITORY"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          API = "https://api.github.com"
          ISSUE_LABEL = "classroom-assignment"

          ISSUES = [
              {
                  "title": "[Entrega] Migracion de CSS a Tailwind",
                  "body": """
          ## Objetivo
          Traducir la base resuelta en CSS tradicional hacia utilidades Tailwind.

          ## Que debe cumplirse
          - [ ] Existe `index.html` y la carpeta `pages/`.
          - [ ] Existen `pages/about.html`, `pages/faq.html` y `pages/privacy.html`.
          - [ ] Todas las paginas incluyen CDN de Tailwind.
          - [ ] Ninguna pagina enlaza `css/styles.css`.
          - [ ] Se conserva la navegacion entre paginas.""",
              },
              {
                  "title": "[Requisito] Home responsive con navegacion y grilla",
                  "body": """
          ## Objetivo
          Traducir el layout principal de `index.html` manteniendo la estructura base.

          ## Que debe cumplirse
          - [ ] Se mantiene el id `menu-principal`.
          - [ ] Existe `#servicios-grid` como grilla.
          - [ ] Se usan utilidades de layout (`flex` y `grid`).
          - [ ] Hay al menos una utilidad responsive y una de hover.""",
              },
              {
                  "title": "[Requisito] About con metricas en grid responsive",
                  "body": """
          ## Objetivo
          Entrenar composicion de bloques de datos en `pages/about.html`.

          ## Que debe cumplirse
          - [ ] Existe `#stats-grid`.
          - [ ] Se usa `grid` para resolver la seccion.
          - [ ] Hay utilidades responsive (`sm:`, `md:` o `lg:`).
          - [ ] Hay coherencia visual con el estilo del home.""",
              },
              {
                  "title": "[Requisito] FAQ con divisores y microinteracciones",
                  "body": """
          ## Objetivo
          Dar legibilidad y feedback visual a una lista de preguntas.

          ## Que debe cumplirse
          - [ ] Existe `#faq-list`.
          - [ ] Hay separacion visual entre items (divisores o bordes).
          - [ ] Los items incluyen feedback visual en hover.""",
              },
              {
                  "title": "[Requisito] Privacy con cards y listas",
                  "body": """
          ## Objetivo
          Organizar informacion legal en bloques claros.

          ## Que debe cumplirse
          - [ ] Existe `#privacy-cards`.
          - [ ] La seccion usa `grid` y responsive.
          - [ ] Las listas usan `list-disc`.""",
              },
              {
                  "title": "[Requisito] Firma personal en el footer",
                  "body": """
          ## Objetivo
          Incorporar una marca personal minima para desalentar copias exactas entre entregas.

          ## Que debe cumplirse
          - [ ] En todas las paginas aparece `Desarrollado por Nombre Apellido`.
          - [ ] Se reemplaza el placeholder `[Nombre y Apellido]`.
          - [ ] La firma queda en el footer y se mantiene legible.""",
              },
              {
                  "title": "[Revision docente] Coherencia visual y buenas practicas",
                  "body": """
          ## Checklist docente
          - [ ] Coherencia visual entre las 4 paginas.
          - [ ] Uso correcto de utilidades Tailwind (sin abuso ni redundancia).
          - [ ] Jerarquia tipografica y espaciados consistentes.
          - [ ] Navegacion funcional y contenido legible.

          ## Nota
          Los tests automaticos ayudan, pero no reemplazan la correccion final docente.""",
              },
          ]

          for _spec in ISSUES:
              _spec["body"] = textwrap.dedent(_spec["body"]).strip()

          def request(method, url, data=None):
              headers = {
                  "Authorization": f"Bearer {TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              body = None
              if data is not None:
                  headers["Content-Type"] = "application/json; charset=utf-8"
                  body = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())

          def list_existing_issue_titles():
              titles = set()
              page = 1
              while True:
                  url = f"{API}/repos/{REPO}/issues?state=all&per_page=100&page={page}"
                  headers = {
                      "Authorization": f"Bearer {TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  }
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      batch = json.loads(resp.read().decode())
                  if not batch:
                      break
                  for item in batch:
                      if item.get("pull_request") is None:
                          title = item.get("title", "").strip()
                          if title:
                              titles.add(title)
                  if len(batch) < 100:
                      break
                  page += 1
              return titles

          def ensure_label_exists(label_name):
              url = f"{API}/repos/{REPO}/labels/{urllib.parse.quote(label_name)}"
              try:
                  request("GET", url)
                  return
              except urllib.error.HTTPError as e:
                  if e.code != 404:
                      raise
              request(
                  "POST",
                  f"{API}/repos/{REPO}/labels",
                  {
                      "name": label_name,
                      "color": "1d76db",
                      "description": "Issue generado automaticamente para Classroom",
                  },
              )
              print(f"Etiqueta creada: {label_name}")

          existing_titles = list_existing_issue_titles()
          ensure_label_exists(ISSUE_LABEL)

          created_count = 0
          skipped_count = 0
          for spec in ISSUES:
              if spec["title"] in existing_titles:
                  skipped_count += 1
                  print("Ya existe, se omite: " + spec["title"])
                  continue
              created = request(
                  "POST",
                  f"{API}/repos/{REPO}/issues",
                  {"title": spec["title"], "body": spec["body"], "labels": [ISSUE_LABEL]},
              )
              created_count += 1
              print("Creado issue #" + str(created["number"]) + ": " + spec["title"])

          print(
              "Listo: "
              + str(created_count)
              + " issue(s) creado(s), "
              + str(skipped_count)
              + " ya existentes."
          )
          PY
