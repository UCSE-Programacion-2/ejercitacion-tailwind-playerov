name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar estructura base
        run: bash scripts/classroom-check.sh base-structure

      - name: Verificar CDN en todas las paginas
        run: bash scripts/classroom-check.sh tailwind-cdn-all-pages

      - name: Verificar ausencia de CSS legacy
        run: bash scripts/classroom-check.sh no-legacy-css-link

      - name: Verificar index layout
        run: bash scripts/classroom-check.sh index-layout-shell

      - name: Verificar index servicios
        run: bash scripts/classroom-check.sh index-services-grid

      - name: Verificar about stats
        run: bash scripts/classroom-check.sh about-stats-grid

      - name: Verificar faq list
        run: bash scripts/classroom-check.sh faq-list-style

      - name: Verificar privacy cards
        run: bash scripts/classroom-check.sh privacy-cards-lists

      - name: Verificar firma del alumno en footer
        run: bash scripts/classroom-check.sh footer-signature
